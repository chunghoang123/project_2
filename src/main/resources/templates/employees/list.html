<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Employees</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; }
        .status-active { color: #198754; font-weight: bold; }
        .status-inactive { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Liste des Employees</h1>

    <table class="table table-striped table-hover table-bordered">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Avatar</th>
            <th>Nom</th>
            <th>Ages</th>
            <th>Statut</th>
            <th>Despartement</th>
            <th>Localisation</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp : ${employees}">
            <td th:text="${emp.id}">1</td>
            <td>
                <img th:src="${emp.avatar}" alt="avatar" class="avatar"/>
            </td>
            <td th:text="${emp.name}">Nom</td>
            <td th:text="${emp.age}">25</td>
            <td>
                <span th:if="${emp.status}" class="status-active">Actif</span>
                <span th:unless="${emp.status}" class="status-inactive">Inactif</span>
            </td>
            <td th:text="${emp.department.name}">IT</td>
            <td th:text="${emp.department.location}">Hanoi</td>
        </tr>
        <tr th:if="${#lists.isEmpty(employees)}">
            <td colspan="7" class="text-center">Aucun employee trouves
                .</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
